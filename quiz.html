<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Quiz</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .quiz-container {
        background: #2c2c54;
        padding: 25px;
        border-radius: 12px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
        margin-bottom: 15px;
    }

    .option {
        background: #40407a;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
    }

    .option:hover {
        background: #706fd3;
    }

    .correct {
        background: #2ecc71 !important;
    }

    .wrong {
        background: #e74c3c !important;
    }

    button {
        margin-top: 15px;
        padding: 10px;
        width: 100%;
        border: none;
        border-radius: 8px;
        background: #34ace0;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #227093;
    }

    #score {
        font-size: 18px;
        margin-top: 10px;
    }
</style>
</head>

<body>

<div class="quiz-container">
    <h2 id="question">Question text</h2>
    <div id="options"></div>
    <button onclick="nextQuestion()">Next</button>
    <div id="score"></div>
</div>

<script>
const quiz = [
    {
        question: "What does HTML stand for?",
        options: ["Hyper Trainer Marking Language", "Hyper Text Markup Language", "Hyper Text Marketing Language", "Hyper Tool Multi Language"],
        answer: 1
    },
    {
        question: "Which language is used for styling web pages?",
        options: ["HTML", "JQuery", "CSS", "XML"],
        answer: 2
    },
    {
        question: "Which is not a JavaScript Framework?",
        options: ["Python Script", "JQuery", "Django", "NodeJS"],
        answer: 2   // Django (not JS)
    },
    {
        question: "Which tag is used to create a hyperlink in HTML?",
        options: ["<link>", "<a>", "<href>", "<hyperlink>"],
        answer: 1
    },
    {
        question: "Which property is used in CSS to change text color?",
        options: ["font-color", "text-color", "color", "background-color"],
        answer: 2
    },
    {
        question: "Which HTML tag is used to display an image?",
        options: ["<image>", "<img>", "<pic>", "<src>"],
        answer: 1
    },
{
        question: "What does CSS stand for?",
        options: ["Computer Style Sheets","Creative Style Sheets","Cascading Style Sheets","Colorful Style Sheets"],
        answer: 2
    },
];
let current = 0;
let score = 0;
let answered = false;

function loadQuestion() {
    const q = quiz[current];
    document.getElementById("question").innerText = q.question;
    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach((opt, index) => {
        const div = document.createElement("div");
        div.classList.add("option");
        div.innerText = opt;
        div.onclick = () => selectAnswer(div, index);
        optionsDiv.appendChild(div);
    });

    answered = false;
}

function selectAnswer(element, index) {
    if (answered) return;

    const correctIndex = quiz[current].answer;
    const options = document.querySelectorAll(".option");

    options.forEach((opt, i) => {
        if (i === correctIndex) {
            opt.classList.add("correct");
        } else if (i === index) {
            opt.classList.add("wrong");
        }
    });

    if (index === correctIndex) {
        score++;
    }

    answered = true;
}

function nextQuestion() {
    if (!answered) {
        alert("Please select an answer!");
        return;
    }

    current++;

    if (current < quiz.length) {
        loadQuestion();
    } else {
        showScore();
    }
}

function showScore() {
    document.querySelector(".quiz-container").innerHTML = `
        <h2>Your Score: ${score} / ${quiz.length}</h2>
        <button onclick="location.reload()">Restart Quiz</button>
    `;
}

// Initialize
loadQuestion();
</script>

</body>
</html>
